# ??? Tell Spring Boot to use H2 in-memory database during tests ???????????????
# This file is ONLY loaded during tests ? your real application.properties is ignored
# The moment tests finish, the H2 database disappears completely

# ??? Database connection ???????????????????????????????????????????????????????
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
# Creates an in-memory H2 database called "testdb"
# DB_CLOSE_DELAY=-1 keeps it alive for the entire test session

spring.datasource.driver-class-name=org.h2.Driver
# Tells Spring to use the H2 driver instead of the PostgreSQL one

spring.datasource.username=sa
# Default H2 username ? "sa" stands for System Administrator

spring.datasource.password=
# H2 needs no password in test mode ? left empty intentionally

# ??? JPA settings ?????????????????????????????????????????????????????????????
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Tells Hibernate to speak H2's version of SQL instead of PostgreSQL's

spring.jpa.hibernate.ddl-auto=create-drop
# Automatically creates all your database tables when tests start
# and drops them completely when tests finish ? starts fresh every time

# ??? Disable real external services ???????????????????????????????????????????
spring.mail.host=localhost
spring.mail.port=25
# Points the email service to a fake local address so no real emails are sent during tests

exchangerate.api.key=test-key
# A fake API key ? exchange rate calls will be mocked in tests anyway

# ??? JWT / modulith library configuration ?????????????????????????????????????
# These tell the modulith auth library where to find the RSA keys for JWT tokens
# Without these, login fails because the library cannot sign or verify tokens

modulith.issuer=MoneyMapping
# the name used as the JWT token issuer ? must match what the main app sets

modulith.privatePem=src/main/resources/MoneyMapping-dev_private.pem
# path to the private key used to SIGN tokens when a user logs in

modulith.publicPem=src/main/resources/MoneyMapping-dev_public.pem
# path to the public key used to VERIFY tokens on protected endpoints

modulith.hibernateConfiguration=src/main/resources/hibernate.cfg.xml
# path to the hibernate config the modulith library needs internally